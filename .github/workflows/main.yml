name: Run News Bot
on:
  schedule:
    - cron: '*/15 * * * *' # اجرای هر ۱۵ دقیقه برای اخبار فوری
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install feedparser requests google-generativeai
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python news_bot.py
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch sent_news.txt users.txt
          git add sent_news.txt users.txt
          git commit -m "Update logs" || echo "No changes"
          git push
